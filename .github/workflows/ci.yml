name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    # We pin Windows because the live-capture module uses pygetwindow, which
    # only works on Windows. The recognition + decision modules are
    # cross-platform, but pinning the matrix keeps the build honest about
    # what the project actually supports today.
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry

      - name: Cache the Poetry virtual environment
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Lint (ruff)
        run: poetry run ruff check src tests scripts

      - name: Test (pytest)
        run: poetry run pytest -v
